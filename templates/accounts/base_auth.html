<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Account{% endblock %} - ગુજરાતી સમાજ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #0B1F4D;
            --saffron: #FF8C00;
            --saffron-light: #FFA733;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', 'Noto Sans Gujarati', sans-serif;
            background: linear-gradient(135deg, #0B1F4D 0%, #1a3a7a 60%, #0d2d5e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 0;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FF8C00' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .auth-card.wide { max-width: 560px; }
        .logo-circle {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--dark-blue), #2d5086);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 0.75rem;
            font-size: 1.7rem; color: white; font-weight: 700;
            border: 3px solid var(--saffron);
        }
        .auth-title-gu {
            font-family: 'Noto Sans Gujarati', sans-serif;
            color: var(--dark-blue);
            font-weight: 700;
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 0.1rem;
        }
        .auth-subtitle {
            color: #888;
            font-size: 13px;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-label {
            font-size: 13px; font-weight: 600; color: var(--dark-blue); margin-bottom: 4px;
        }
        .form-control, .form-select {
            border-radius: 7px;
            font-size: 14px;
            padding: 0.55rem 0.85rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--saffron);
            box-shadow: 0 0 0 0.2rem rgba(255,140,0,0.15);
        }
        .btn-saffron {
            background: var(--saffron);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.65rem;
            font-weight: 600;
            font-size: 15px;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-saffron:hover { background: var(--saffron-light); color: white; }
        .auth-link {
            color: var(--saffron);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-link:hover { text-decoration: underline; }
        .back-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 13.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }
        .back-link:hover { color: white; }
        .errorlist { list-style: none; padding: 0; margin: 4px 0 0; color: #dc3545; font-size: 12px; }
        .field-error { border-color: #dc3545 !important; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<div class="container">
    <div class="text-center">
        <a href="{% url 'home' %}" class="back-link">
            <i class="bi bi-arrow-left"></i> Back to Website / ગુજરાતી સમાજ
        </a>
    </div>

    {% if messages %}
    <div style="max-width:480px; margin:0 auto 1rem; position:relative; z-index:1;">
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" style="font-size:13.5px; border-radius:8px;">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
