<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gujarati Samaj Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0B1F4D 0%, #1a3a7a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Poppins', 'Noto Sans Gujarati', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
        }
        .logo-circle {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #0B1F4D, #2d5086);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.8rem; color: white; font-weight: 700;
            border: 3px solid #FF8C00;
        }
        .form-control:focus { border-color: #FF8C00; box-shadow: 0 0 0 0.2rem rgba(255,140,0,0.15); }
        .btn-login { background: #0B1F4D; color: white; border: none; padding: 0.7rem; font-weight: 600; border-radius: 8px; width: 100%; font-size: 15px; }
        .btn-login:hover { background: #0d2a66; color: white; }
        .input-group-text { background: #f8f9fa; border-right: none; }
        .form-control { border-left: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="logo-circle">&#2332;</div>
            <h5 style="color:#0B1F4D; font-weight:700; margin:0;">JSM Samaj Admin</h5>
            <p style="color:#888; font-size:13px; margin:4px 0 0;">Community Management Portal</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger" style="font-size:13.5px;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label style="font-size:13px; font-weight:600; color:#0B1F4D; margin-bottom:6px;">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill" style="color:#FF8C00;"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus
                           style="border-radius: 0 6px 6px 0;">
                </div>
            </div>
            <div class="mb-4">
                <label style="font-size:13px; font-weight:600; color:#0B1F4D; margin-bottom:6px;">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill" style="color:#FF8C00;"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required
                           style="border-radius: 0 6px 6px 0;">
                </div>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login / પ્રવેશ
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'home' %}" style="color:#888; font-size:13px; text-decoration:none;">
                <i class="bi bi-arrow-left me-1"></i>Back to Website
            </a>
        </div>
    </div>
</div>
</body>
</html>
